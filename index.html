<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาเกียรติบัตรออนไลน์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Mitr&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a73e8;
            --success-color: #28a745;
            --bg-color: #f4f7f9;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-family: 'Mitr', sans-serif;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 24px;
        }

        .description {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .search-wrapper {
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 25px;
            font-size: 16px;
            border: 2px solid #eee;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 5px 15px rgba(26, 115, 232, 0.15);
        }

        /* ส่วนแสดงผลลัพธ์ */
        #resultsList {
            list-style: none;
            padding: 0;
            margin: 15px 0 0 0;
            max-height: 300px;
            overflow-y: auto;
            border-radius: 12px;
            background: #fff;
            display: none; /* ซ่อนไว้ตอนเริ่ม */
            border: 1px solid #eee;
        }

        .result-item {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f9f9f9;
            transition: background 0.2s;
        }

        .result-item:hover {
            background-color: #f8faff;
        }

        .result-item span {
            font-weight: 500;
            color: #333;
            text-align: left;
        }

        .download-link {
            background-color: var(--success-color);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            transition: 0.3s;
        }

        .download-link:hover {
            background-color: #218838;
            transform: scale(1.05);
        }

        .no-result {
            padding: 20px;
            color: #999;
            font-size: 14px;
        }

        footer {
            margin-top: 30px;
            font-size: 11px;
            color: #bbb;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ตรวจสอบรายชื่อรับเกียรติบัตร</h1>
    <p class="description">กรุณาพิมพ์ชื่อ-นามสกุล เพื่อค้นหาไฟล์ของคุณ</p>
    
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="พิมพ์ชื่อเพื่อค้นหา..." oninput="doSearch()">
        <ul id="resultsList"></ul>
    </div>

    <footer>
        &copy; 2026 ระบบออกเกียรติบัตรอัตโนมัติ
    </footer>
</div>

<script>
    /**
     * 1. ข้อมูลรายชื่อ (DATABASE)
     * แก้ไขตรงนี้: ใส่รายชื่อให้ตรงกับชื่อไฟล์ PDF ที่คุณอัปโหลดไว้ในโฟลเดอร์ pdfs/
     * ตัวอย่าง: { name: "ชื่อบนหน้าเว็บ", file: "ชื่อไฟล์จริง.pdf" }
     */
    const certificateData = [
        { name: "สมชาย ใจดี", file: "Somchai-Jaidee.pdf" },
        { name: "สมหญิง รักเรียน", file: "Somying-Rakrien.pdf" },
        { name: "วิชัย กล้าหาญ", file: "Wichai-Klahan.pdf" },
        { name: "กมลวรรณ สดใส", file: "Kamonwan-Sodsai.pdf" }
    ];

    function doSearch() {
        const input = document.getElementById('searchInput').value.trim().toLowerCase();
        const list = document.getElementById('resultsList');
        
        // ล้างข้อมูลเดิม
        list.innerHTML = '';

        if (input === '') {
            list.style.display = 'none';
            return;
        }

        // ค้นหาข้อมูลที่ตรงกัน (Case-insensitive)
        const matched = certificateData.filter(item => 
            item.name.toLowerCase().includes(input)
        );

        if (matched.length > 0) {
            list.style.display = 'block';
            matched.forEach(item => {
                const li = document.createElement('li');
                li.className = 'result-item';
                li.innerHTML = `
                    <span>${item.name}</span>
                    <a href="pdfs/${item.file}" class="download-link" target="_blank" download>ดาวน์โหลด</a>
                `;
                list.appendChild(li);
            });
        } else {
            list.style.display = 'block';
            list.innerHTML = '<div class="no-result">ไม่พบรายชื่อที่ค้นหา</div>';
        }
    }
</script>

</body>
</html>
