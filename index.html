<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาเกียรติบัตร</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Mitr&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --bg: #f8fafc; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 500px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-family: 'Mitr', sans-serif; color: var(--primary); margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 15px 25px; font-size: 16px; border: 2px solid #e2e8f0; border-radius: 50px; outline: none; box-sizing: border-box; }
        input[type="text"]:focus { border-color: var(--primary); }
        #resultsList { list-style: none; padding: 0; margin-top: 20px; display: none; }
        .result-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid #f1f5f9; border-radius: 12px; margin-bottom: 10px; background: #fff; }
        .name-info { font-weight: bold; color: #334155; }
        .btn-dl { background: var(--success); color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ตรวจสอบรายชื่อ</h1>
    <input type="text" id="searchInput" placeholder="พิมพ์ชื่อเพื่อค้นหา..." oninput="doSearch()">
    <ul id="resultsList"></ul>
</div>

<script>
    // *** สำคัญ: ตรวจสอบชื่อไฟล์ PDF ใน GitHub ให้ตรงเป๊ะ (ตัวพิมพ์เล็ก-ใหญ่มีผล) ***
    const certificateData = [
        { "name": "king", "file": "king-certificate.pdf" },
        { "name": "สมหญิง รักเรียน", "file": "Somying-Rakrien.pdf" },
        { "name": "กมลวรรณ สดใส", "file": "Kamonwan-Sodsai.pdf" }
    ];

    function doSearch() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        const list = document.getElementById('resultsList');
        list.innerHTML = '';

        if (!query) { list.style.display = 'none'; return; }

        const matched = certificateData.filter(item => item.name.toLowerCase().includes(query));

        if (matched.length > 0) {
            list.style.display = 'block';
            matched.forEach(item => {
                const li = document.createElement('li');
                li.className = 'result-item';
                // แก้ไข Path ตรงนี้ให้เรียกไปที่โฟลเดอร์ pdfs/
                const filePath = `pdfs/${item.file}`;
                li.innerHTML = `
                    <span class="name-info">${item.name}</span>
                    <a href="${filePath}" class="btn-dl" target="_blank">ดาวน์โหลด PDF</a>
                `;
                list.appendChild(li);
            });
        } else {
            list.style.display = 'block';
            list.innerHTML = '<div style="color:#999; margin-top:20px;">ไม่พบรายชื่อ</div>';
        }
    }
</script>
</body>
</html>
