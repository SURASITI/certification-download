<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาเกียรติบัตร</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Mitr&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --text: #333; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; padding-top: 50px; }
        .card { width: 90%; max-width: 500px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-family: 'Mitr', sans-serif; color: var(--primary); font-size: 24px; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 15px 20px; font-size: 16px; border: 2px solid #ddd; border-radius: 50px; outline: none; box-sizing: border-box; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); }
        
        /* ส่วนรายการผลลัพธ์ */
        #resultsList { list-style: none; padding: 0; margin: 20px 0 0 0; text-align: left; }
        .result-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 10px;
            background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .name-text { font-weight: bold; color: var(--text); font-size: 16px; flex: 1; }
        .btn-dl { 
            background: var(--success); color: white; padding: 8px 15px; 
            border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: bold;
            transition: 0.3s; margin-left: 10px;
        }
        .btn-dl:hover { background: #218838; }
        .no-data { padding: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h1>ตรวจสอบรายชื่อรับเกียรติบัตร</h1>
    <input type="text" id="searchInp" placeholder="พิมพ์ชื่อ-นามสกุล เพื่อค้นหา..." oninput="startSearch()">
    
    <ul id="resultsList"></ul>
    
    <p style="font-size: 11px; color: #bbb; margin-top: 30px;">© 2026 ระบบออกเกียรติบัตรอัตโนมัติ</p>
</div>

<script>
    // --- 1. ใส่รายชื่อของคุณที่นี่ ---
    // รูปแบบคือ { "n": "ชื่อที่แสดง", "f": "ชื่อไฟล์ในโฟลเดอร์ pdfs" }
    const data = [
        { "n": "สมหญิง รักเรียน", "f": "somying.pdf" },
        { "n": "กมลวรรณ สดใส", "f": "kamonwan.pdf" },
        { "n": "สมชาย ใจดี", "f": "somchai.pdf" },
        { "n": "king", "f": "king-certificate.pdf" }
        // เพิ่มรายชื่ออื่นๆ ต่อท้ายได้เลยครับ อย่าลืมใส่เครื่องหมาย , ปิดท้ายบรรทัดก่อนหน้า
    ];

    function startSearch() {
        const query = document.getElementById('searchInp').value.trim().toLowerCase();
        const list = document.getElementById('resultsList');
        list.innerHTML = '';

        if (query === '') return;

        const filtered = data.filter(item => item.n.toLowerCase().includes(query));

        if (filtered.length > 0) {
            filtered.forEach(item => {
                const li = document.createElement('li');
                li.className = 'result-item';
                li.innerHTML = `
                    <span class="name-text">${item.n}</span>
                    <a href="pdfs/${item.f}" class="btn-dl" target="_blank" download>ดาวน์โหลด</a>
                `;
                list.appendChild(li);
            });
        } else {
            list.innerHTML = '<div class="no-data">ไม่พบรายชื่อที่ค้นหา</div>';
        }
    }
</script>

</body>
</html>
